<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Credential - ProofHer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.0/ethers.umd.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex flex-col">
    <header class="bg-white shadow-sm py-4">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-indigo-600">ProofHer</a>
            <div class="flex items-center space-x-4">
                <a href="issue.html" class="text-gray-600 hover:text-indigo-600 font-medium">Issue</a>
                <button id="connectWallet" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md font-medium hover:bg-gray-200 border border-gray-300">Connect to Endorse</button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-2xl mx-auto w-full p-4 py-8">
        <h2 class="text-3xl font-bold mb-6 text-center">Verify Credential</h2>
        
        <form id="verifyForm" class="flex flex-col sm:flex-row gap-2 mb-8">
            <input type="text" id="credential_id" placeholder="Enter Credential ID" required class="flex-grow px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <button type="submit" class="bg-indigo-600 text-white font-bold py-3 px-8 rounded-md hover:bg-indigo-700 transition">
                Verify
            </button>
        </form>

        <div id="loadingIndicator" class="hidden text-center font-medium text-indigo-600 py-8">
            Checking records on Polygon Amoy...
        </div>

        <div id="resultCard" class="hidden bg-white shadow-xl rounded-xl overflow-hidden border border-gray-100">
            <div id="statusBanner" class="py-4 px-6 text-center font-bold text-lg text-white">
                <!-- Status color and text injected via JS -->
            </div>
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-y-4">
                    <div class="text-sm font-medium text-gray-500">Recipient Name</div>
                    <div id="valName" class="font-semibold text-right text-gray-900"></div>
                    
                    <div class="text-sm font-medium text-gray-500">Skill / Level</div>
                    <div class="font-semibold text-right text-gray-900"><span id="valSkill"></span> (<span id="valLevel"></span>)</div>
                    
                    <div class="text-sm font-medium text-gray-500">Issuer Name</div>
                    <div id="valIssuerName" class="font-semibold text-right text-gray-900"></div>
                    
                    <div class="text-sm font-medium text-gray-500">Issued On</div>
                    <div id="valDate" class="font-semibold text-right text-gray-900"></div>
                    
                    <div class="text-sm font-medium text-gray-500">Evidence</div>
                    <div class="text-right">
                        <a id="valEvidence" href="#" target="_blank" class="text-indigo-600 hover:underline font-medium inline-flex items-center">
                            View Work 
                            <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        </a>
                    </div>
                </div>

                <hr class="border-gray-200">

                <div class="bg-gray-50 p-5 rounded-md space-y-3 text-sm border border-gray-100">
                    <h4 class="font-bold text-gray-800 mb-2">Blockchain Status</h4>
                    <div class="flex justify-between items-center bg-white p-2 rounded shadow-sm">
                        <span class="text-gray-500 font-medium">Issuer Address</span>
                        <a id="onchainIssuer" href="#" target="_blank" class="text-indigo-600 font-mono truncate max-w-[150px] sm:max-w-xs hover:underline"></a>
                    </div>
                    <div class="flex justify-between items-center bg-white p-2 rounded shadow-sm">
                        <span class="text-gray-500 font-medium">Endorsements</span>
                        <div class="flex items-center gap-3">
                            <span id="onchainEndorsements" class="font-mono font-bold text-gray-900 px-2 bg-gray-100 rounded"></span>
                            <button id="endorseBtn" class="hidden px-3 py-1 bg-green-100 border border-green-300 text-green-800 text-xs font-bold rounded hover:bg-green-200 focus:outline-none focus:ring-2 focus:ring-green-500 transition-colors shadow-sm">ENDORSE</button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center bg-white p-2 rounded shadow-sm">
                        <span class="text-gray-500 font-medium">Blockchain Hash</span>
                        <span id="onchainHash" class="font-mono text-xs text-gray-600 truncate max-w-[150px] sm:max-w-xs" title=""></span>
                    </div>
                    <div class="flex justify-between items-center bg-white p-2 rounded shadow-sm border-l-4 border-indigo-500">
                        <span class="text-gray-500 font-medium">Computed Hash</span>
                        <span id="computedHash" class="font-mono text-xs text-indigo-700 font-semibold truncate max-w-[150px] sm:max-w-xs block text-right" title=""></span>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="errorBox" class="hidden bg-red-50 border border-red-200 text-red-800 p-4 rounded-md mt-6 font-medium shadow-sm"></div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/verify.js"></script>
</body>
</html>
